<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 120">
  <!-- Ligne accent verte top -->
  <rect x="0" y="0" width="1000" height="4" fill="#00A86B"/>
  <!-- Symbole -->
  <g transform="translate(30, 30)">
    <circle cx="30" cy="30" r="28" fill="#0A1628"/>
    <path d="M 16 34 L 26 44 L 46 22" fill="none" stroke="#00A86B" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Logotype -->
  <text x="115" y="58" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="-1">
    <tspan fill="#0A1628">Ordo</tspan><tspan fill="#00A86B">sur</tspan><tspan fill="#0A1628">.</tspan>
  </text>
  <!-- Tagline -->
  <text x="115" y="82" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#475569" letter-spacing="0.5" font-style="italic">
    La prescription, sécurisée.
  </text>
  <!-- Date dynamique placeholder -->
  <text x="970" y="58" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#475569" letter-spacing="3">
    ORDONNANCE
  </text>
  <text x="970" y="78" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="400" fill="#94A3B8">
    N° [numéro unique]
  </text>
</svg>